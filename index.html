<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CartGo - Groceries in Minutes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">Cart<span>Go</span></div>
  <button onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
</header>

<section class="banner">
  <h1>Groceries delivered in 10 minutes ⚡</h1>
</section>

<section class="category">
  <h2>🥦 Vegetables</h2>
  <div class="products" id="vegetables"></div>
</section>

<section class="category">
  <h2>🍎 Fruits</h2>
  <div class="products" id="fruits"></div>
</section>

<section class="category">
  <h2>🥛 Dairy</h2>
  <div class="products" id="dairy"></div>
</section>

<section class="category">
  <h2>📦 Packed Food</h2>
  <div class="products" id="packed"></div>
</section>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="totalPrice">0</span></h3>
  <button class="checkout">Checkout</button>
</div>

<script src="script.js"></script>
</body>
</html>
